# Qirop School ERP — nginx site (frontend + API served together).
# The auth cookie is SameSite=Lax, so the frontend and the API must share a
# site: nginx serves the built Vite app and proxies /api on the same host.
#
#   sudo cp nginx-akm.conf /etc/nginx/sites-available/akm
#   sudo ln -s /etc/nginx/sites-available/akm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ── No domain yet (bare IP over HTTP) ─────────────────────────────────────
# Keep `server_name _;` below and open http://YOUR.VPS.IP in the browser.
# You MUST set COOKIE_SECURE="false" in the backend .env, or browsers will
# drop the auth cookie over plain HTTP and logins won't stick.
#
# ── When you get a domain later ───────────────────────────────────────────
# 1. Point the domain's A record at the VPS.
# 2. Replace `server_name _;` with `server_name school.example.com;`
# 3. sudo certbot --nginx -d school.example.com     (adds TLS + redirect)
# 4. Set COOKIE_SECURE="auto" in .env, rebuild the frontend with the https
#    VITE_API_URL, and restart the service.

server {
    listen 80 default_server;
    server_name _; # ← replace with your domain when you have one

    # Built frontend (upload the local `dist/` from `npm run build` here)
    root /opt/akm/frontend;
    index index.html;

    # API → the systemd service on localhost
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m; # homework attachments are ≤ 10 MB
    }

    # SPA fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
